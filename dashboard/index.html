<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meme 模拟盘 · 数据面板</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121820;
      --panel-2: #171f2a;
      --border: #243041;
      --text: #e8eef7;
      --muted: #8b9bb3;
      --green: #3dd68c;
      --red: #ff6b7a;
      --blue: #5b9dff;
      --amber: #f5b942;
      --font: "SF Pro Text", "PingFang SC", "Segoe UI", system-ui, sans-serif;
      --mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2740 0%, transparent 55%),
                  radial-gradient(900px 500px at 100% 0%, #1f2a18 0%, transparent 50%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px 8px;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 650; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { border-color: var(--blue); }
    main { padding: 16px 24px 40px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .card .value { font-size: 1.45rem; font-weight: 650; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .card .hint { color: var(--muted); font-size: 0.78rem; margin-top: 4px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    tr:hover td { background: rgba(91, 157, 255, 0.06); }
    .addr { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #chart { width: 100%; height: 200px; display: block; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .pill.open { background: rgba(61, 214, 140, 0.15); color: var(--green); }
    .pill.buy { background: rgba(91, 157, 255, 0.15); color: var(--blue); }
    .pill.sell { background: rgba(245, 185, 66, 0.15); color: var(--amber); }
    .banner {
      background: rgba(255, 107, 122, 0.12);
      border: 1px solid rgba(255, 107, 122, 0.35);
      color: #ffc9cf;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .banner code { background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    .status-online { color: var(--green); }
    .status-offline { color: var(--amber); }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Meme Onchain Explorer</h1>
      <div class="sub" id="meta">Paper trading · Solana · 加载中…</div>
    </div>
    <div class="actions">
      <button type="button" id="refreshBtn">刷新</button>
      <label><input type="checkbox" id="autoRefresh" checked /> 自动刷新 (30s)</label>
    </div>
  </header>

  <main>
    <div id="loadError" class="banner" hidden></div>

    <div class="grid" id="kpis"></div>

    <div class="layout">
      <div>
        <section class="section">
          <h2>单币盈亏明细</h2>
          <p class="sub" style="margin:-6px 0 10px;color:var(--muted);font-size:0.8rem">买入价 / 卖出价（或现价）/ 盈亏额 / 盈亏率</p>
          <div class="table-scroll" id="ledgerWrap"></div>
        </section>
        <section class="section">
          <h2>权益曲线</h2>
          <svg id="chart" viewBox="0 0 600 200" preserveAspectRatio="none"></svg>
        </section>
      </div>
      <div>
        <section class="section">
          <h2>每轮扫描</h2>
          <div id="roundsWrap"></div>
        </section>
        <section class="section">
          <h2>最近交易</h2>
          <div id="tradesWrap"></div>
        </section>
        <section class="section">
          <h2>策略参数</h2>
          <div id="configWrap"></div>
        </section>
      </div>
    </div>
    <footer>数据来自 <code>dashboard/snapshot.json</code> 或 <code>data.js</code> · 每小时 tick 自动更新 · <span id="dataMode">—</span></footer>
  </main>

  <script src="data.js"></script>
  <script>
    const $ = (sel) => document.querySelector(sel);

    function fmtUsd(n, digits = 2) {
      if (n == null || Number.isNaN(n)) return "—";
      return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    function fmtPct(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const v = Number(n);
      const sign = v > 0 ? "+" : "";
      return sign + v.toFixed(2) + "%";
    }

    function fmtPrice(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const v = Number(n);
      if (v === 0) return "$0";
      if (v >= 1) return "$" + v.toFixed(4);
      if (v >= 0.0001) return "$" + v.toFixed(8);
      return "$" + v.toExponential(4);
    }

    function pnlClass(n) {
      if (n == null) return "";
      return Number(n) >= 0 ? "pos" : "neg";
    }

    function shortAddr(a) {
      if (!a) return "";
      return a.length > 12 ? a.slice(0, 6) + "…" + a.slice(-4) : a;
    }

    function renderKpis(data) {
      const s = data.summary || {};
      const items = [
        { label: "总权益", value: fmtUsd(s.equity_usd), hint: "现金 + 持仓市值" },
        { label: "总盈亏", value: fmtUsd(s.total_pnl_usd), hint: fmtPct(s.total_pnl_pct), cls: pnlClass(s.total_pnl_usd) },
        { label: "未实现", value: fmtUsd(s.unrealized_pnl_usd), hint: "浮盈浮亏", cls: pnlClass(s.unrealized_pnl_usd) },
        { label: "已实现", value: fmtUsd(s.realized_pnl_usd), hint: "已平仓累计", cls: pnlClass(s.realized_pnl_usd) },
        { label: "现金", value: fmtUsd(s.cash_usd), hint: "可用余额" },
        { label: "持仓市值", value: fmtUsd(s.positions_value_usd), hint: (s.open_positions || 0) + " 个仓位" },
        { label: "轮次", value: String(data.round || 0), hint: "每小时 +1 · 扫描 " + (data.scan_count || 0) + " 次" },
        { label: "风控", value: (data.risk?.blacklist || 0) + " 黑 / " + (data.risk?.cooldowns || 0) + " 冷却", hint: "黑名单 / 冷却中" },
      ];
      $("#kpis").innerHTML = items.map((it) => `
        <div class="card">
          <div class="label">${it.label}</div>
          <div class="value ${it.cls || ""}">${it.value}</div>
          <div class="hint">${it.hint || ""}</div>
        </div>
      `).join("");
    }

    function renderChart(curve, initial) {
      const svg = $("#chart");
      if (!curve?.length) {
        svg.innerHTML = '<text x="300" y="100" fill="#8b9bb3" text-anchor="middle" font-size="14">暂无历史报告</text>';
        return;
      }
      const w = 600, h = 200, pad = 24;
      const values = curve.map((p) => p.equity_usd);
      const min = Math.min(initial, ...values) * 0.998;
      const max = Math.max(initial, ...values) * 1.002;
      const x = (i) => pad + (i / Math.max(1, curve.length - 1)) * (w - pad * 2);
      const y = (v) => h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
      const line = curve.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.equity_usd).toFixed(1)}`).join(" ");
      const baseY = y(initial);
      svg.innerHTML = `
        <line x1="${pad}" y1="${baseY}" x2="${w - pad}" y2="${baseY}" stroke="#243041" stroke-dasharray="4 4"/>
        <text x="${pad}" y="${baseY - 6}" fill="#8b9bb3" font-size="10">${fmtUsd(initial, 0)} 本金</text>
        <path d="${line}" fill="none" stroke="#5b9dff" stroke-width="2.5"/>
        ${curve.map((p, i) => `<circle cx="${x(i)}" cy="${y(p.equity_usd)}" r="4" fill="#3dd68c"/>`).join("")}
      `;
    }

    function table(headers, rows) {
      if (!rows.length) return '<div class="empty">暂无数据</div>';
      return `<table><thead><tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table>`;
    }

    function getLedger(data) {
      if (data.position_ledger?.length) return data.position_ledger;
      const rows = [];
      for (const p of data.open_positions || []) {
        rows.push({
          trade_id: p.trade_id, symbol: p.symbol, status: "持仓中",
          buy_price: p.entry_price, current_price: p.last_price, cost_usd: p.cost_usd,
          pnl_usd: p.unrealized_pnl_usd, pnl_pct: p.unrealized_pnl_pct, exit_reason: null,
        });
      }
      for (const p of data.closed_positions || []) {
        rows.push({
          trade_id: p.trade_id, symbol: p.symbol, status: "已平仓",
          buy_price: p.entry_price, sell_price: p.last_price, cost_usd: p.cost_usd,
          pnl_usd: p.realized_pnl_usd, pnl_pct: p.realized_pnl_pct, exit_reason: p.exit_reason,
        });
      }
      return rows;
    }

    function renderLedger(data) {
      const rows = getLedger(data).map((p) => {
        const isOpen = p.status === "持仓中";
        const sellOrMark = isOpen ? fmtPrice(p.current_price) : fmtPrice(p.sell_price);
        const sellLabel = isOpen ? "现价" : "卖出价";
        return `
        <tr>
          <td>${p.trade_id || "—"}</td>
          <td><strong>${p.symbol || "—"}</strong></td>
          <td><span class="pill ${isOpen ? "open" : "sell"}">${p.status}</span></td>
          <td class="num">${fmtPrice(p.buy_price)}</td>
          <td class="num" title="${sellLabel}">${sellOrMark}</td>
          <td class="num">${fmtUsd(p.cost_usd)}</td>
          <td class="num ${pnlClass(p.pnl_usd)}">${fmtUsd(p.pnl_usd)}</td>
          <td class="num ${pnlClass(p.pnl_pct)}">${fmtPct(p.pnl_pct)}</td>
          <td>${isOpen ? "持仓中" : (p.exit_reason || "—")}</td>
        </tr>`;
      });
      $("#ledgerWrap").innerHTML = table(
        ["ID", "代币", "状态", "买入价", "卖出价/现价", "成本", "盈亏额", "盈亏率", "备注"],
        rows
      );
    }

    function renderRounds(data) {
      const rows = (data.round_activity || []).slice().reverse().map((r) => `
        <tr>
          <td class="num">#${r.round}</td>
          <td class="num">${r.signals}</td>
          <td class="num">${r.candidates}</td>
          <td class="num">${r.opened}</td>
          <td class="num">${r.positions}</td>
        </tr>
      `);
      $("#roundsWrap").innerHTML = table(["轮次", "信号", "候选", "开仓", "持仓数"], rows);
    }

    function renderTrades(data) {
      const rows = (data.recent_trades || []).slice().reverse().map((t) => `
        <tr>
          <td><span class="pill ${t.type === "BUY" ? "buy" : "sell"}">${t.type === "BUY" ? "买入" : "卖出"}</span></td>
          <td><strong>${t.symbol || "—"}</strong></td>
          <td class="num">${fmtPrice(t.buy_price ?? t.entry_price)}</td>
          <td class="num">${t.type === "SELL" ? fmtPrice(t.sell_price ?? t.last_price) : "—"}</td>
          <td class="num">${fmtUsd(t.cost_usd)}</td>
          <td class="num ${pnlClass(t.pnl_usd)}">${t.type === "SELL" ? fmtUsd(t.pnl_usd) : "—"}</td>
          <td class="num ${pnlClass(t.pnl_pct)}">${t.type === "SELL" ? fmtPct(t.pnl_pct) : "—"}</td>
          <td>${t.exit_reason || "—"}</td>
          <td style="color:var(--muted);font-size:0.75rem">${(t.ts || "").replace("T", " ").slice(0, 19)}</td>
        </tr>
      `);
      $("#tradesWrap").innerHTML = table(
        ["类型", "代币", "买入价", "卖出价", "成本", "盈亏额", "盈亏率", "原因", "时间"],
        rows
      );
    }

    function renderConfig(data) {
      const c = data.config || {};
      const rows = Object.entries(c).map(([k, v]) => `
        <tr><td>${k}</td><td class="num">${v}</td></tr>
      `);
      $("#configWrap").innerHTML = table(["参数", "值"], rows);
    }

    function showLoadError(msg) {
      const el = $("#loadError");
      el.hidden = false;
      el.innerHTML = msg;
    }

    function setDataMode(mode) {
      const el = $("#dataMode");
      if (mode === "live") {
        el.textContent = "在线刷新";
        el.className = "status-online";
      } else {
        el.textContent = "离线快照（刷新页面更新）";
        el.className = "status-offline";
      }
    }

    function renderAll(data, mode) {
      $("#loadError").hidden = true;
      const chain = (data.chain || "solana").toUpperCase();
      const nextMin = Math.ceil((data.next_round_in_seconds || 0) / 60);
      const nextHint = nextMin > 0 ? ` · 下轮约 ${nextMin} 分钟` : "";
      $("#meta").textContent = `${chain} · 第 ${data.round} 轮 · 扫描 ${data.scan_count || 0} 次${nextHint} · 更新 ${(data.generated_at || "").replace("T", " UTC ").slice(0, 22)}`;
      renderKpis(data);
      renderChart(data.equity_curve || [], data.config?.initial_cash_usd || 1000);
      renderLedger(data);
      renderRounds(data);
      renderTrades(data);
      renderConfig(data);
      setDataMode(mode);
    }

    async function loadSnapshot() {
      const url = "snapshot.json?t=" + Date.now();
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        renderAll(await res.json(), "live");
        return;
      } catch (err) {
        if (window.__SNAPSHOT__) {
          renderAll(window.__SNAPSHOT__, "offline");
          return;
        }
        showLoadError(
          "无法加载数据。请执行：<br>" +
          "<code>python3 scripts/meme_sim_trader.py dashboard</code><br>" +
          "然后任选其一：<br>" +
          "1) 安装常驻服务 <code>./scripts/install_dashboard_service.sh</code><br>" +
          "2) 直接打开 <code>dashboard/index.html</code>（读取同目录 <code>data.js</code>）<br>" +
          "<small>原因: " + err.message + "</small>"
        );
      }
    }

    $("#refreshBtn").addEventListener("click", loadSnapshot);
    let timer = null;
    function setupAuto() {
      if (timer) clearInterval(timer);
      if ($("#autoRefresh").checked) timer = setInterval(loadSnapshot, 30000);
    }
    $("#autoRefresh").addEventListener("change", setupAuto);
    loadSnapshot();
    setupAuto();
  </script>
</body>
</html>
