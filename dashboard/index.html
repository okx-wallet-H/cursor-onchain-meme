<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meme 模拟盘 · 数据面板</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121820;
      --panel-2: #171f2a;
      --border: #243041;
      --text: #e8eef7;
      --muted: #8b9bb3;
      --green: #3dd68c;
      --red: #ff6b7a;
      --blue: #5b9dff;
      --amber: #f5b942;
      --font: "SF Pro Text", "PingFang SC", "Segoe UI", system-ui, sans-serif;
      --mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 600px at 10% -10%, #1a2740 0%, transparent 55%),
                  radial-gradient(900px 500px at 100% 0%, #1f2a18 0%, transparent 50%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px 8px;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 650; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { border-color: var(--blue); }
    main { padding: 16px 24px 40px; max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .card .value { font-size: 1.45rem; font-weight: 650; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .card .hint { color: var(--muted); font-size: 0.78rem; margin-top: 4px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .section h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    tr:hover td { background: rgba(91, 157, 255, 0.06); }
    .addr { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #chart { width: 100%; height: 200px; display: block; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .pill.open { background: rgba(61, 214, 140, 0.15); color: var(--green); }
    .pill.buy { background: rgba(91, 157, 255, 0.15); color: var(--blue); }
    .pill.sell { background: rgba(245, 185, 66, 0.15); color: var(--amber); }
    .banner {
      background: rgba(255, 107, 122, 0.12);
      border: 1px solid rgba(255, 107, 122, 0.35);
      color: #ffc9cf;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .banner code { background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    .status-online { color: var(--green); }
    .status-offline { color: var(--amber); }
    .status-degraded { color: var(--amber); }
    .status-paused { color: var(--muted); }
    #runtimeBanner {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      align-items: center;
    }
    #runtimeBanner.online {
      background: rgba(61, 214, 140, 0.1);
      border: 1px solid rgba(61, 214, 140, 0.35);
      color: #b8f5d4;
    }
    #runtimeBanner.degraded {
      background: rgba(245, 185, 66, 0.12);
      border: 1px solid rgba(245, 185, 66, 0.4);
      color: #ffe6a8;
    }
    #runtimeBanner.offline, #runtimeBanner.paused, #runtimeBanner.starting {
      background: rgba(255, 107, 122, 0.12);
      border: 1px solid rgba(255, 107, 122, 0.35);
      color: #ffc9cf;
    }
    #runtimeBanner strong { font-weight: 650; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Meme Onchain Explorer</h1>
      <div class="sub" id="meta">Paper trading · Solana · 加载中…</div>
    </div>
    <div class="actions">
      <a id="stableLink" href="https://okx-wallet-H.github.io/cursor-onchain-meme/" target="_blank" rel="noopener" style="color:var(--blue);font-size:0.85rem;text-decoration:none;margin-right:8px">稳定面板 ↗</a>
      <button type="button" id="refreshBtn">刷新</button>
      <label><input type="checkbox" id="autoRefresh" checked /> 自动刷新 (30s)</label>
    </div>
  </header>

  <main>
    <div id="loadError" class="banner" hidden></div>
    <div id="runtimeBanner" class="online" hidden></div>

    <div class="grid" id="kpis"></div>

    <div class="layout">
      <div>
        <section class="section">
          <h2>单币盈亏明细</h2>
          <p class="sub" style="margin:-6px 0 10px;color:var(--muted);font-size:0.8rem">买入价 / 卖出价（或现价）/ 盈亏额 / 盈亏率</p>
          <div class="table-scroll" id="ledgerWrap"></div>
        </section>
        <section class="section">
          <h2>权益曲线</h2>
          <svg id="chart" viewBox="0 0 600 200" preserveAspectRatio="none"></svg>
        </section>
      </div>
      <div>
        <section class="section">
          <h2>每轮扫描</h2>
          <div id="roundsWrap"></div>
        </section>
        <section class="section">
          <h2>最近交易</h2>
          <div id="tradesWrap"></div>
        </section>
        <section class="section">
          <h2>策略参数</h2>
          <div id="configWrap"></div>
        </section>
      </div>
    </div>
    <footer>数据源：<span id="dataSource">—</span> · 每 30 分钟 tick 推送到仓库 · <span id="dataMode">—</span></footer>
  </main>

  <script src="data.js"></script>
  <script>
    const GITHUB_REPO = "okx-wallet-H/cursor-onchain-meme";
    const GITHUB_BRANCH = "main";
    const GITHUB_PAGES_URL = "https://okx-wallet-H.github.io/cursor-onchain-meme/";
    const GITHUB_RAW_SNAPSHOT =
      `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/dashboard/snapshot.json`;

    const $ = (sel) => document.querySelector(sel);

    function fmtUsd(n, digits = 2) {
      if (n == null || Number.isNaN(n)) return "—";
      return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    function fmtPct(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const v = Number(n);
      const sign = v > 0 ? "+" : "";
      return sign + v.toFixed(2) + "%";
    }

    function fmtPrice(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const v = Number(n);
      if (v === 0) return "$0";
      if (v >= 1) return "$" + v.toFixed(4);
      if (v >= 0.0001) return "$" + v.toFixed(8);
      return "$" + v.toExponential(4);
    }

    function pnlClass(n) {
      if (n == null) return "";
      return Number(n) >= 0 ? "pos" : "neg";
    }

    function shortAddr(a) {
      if (!a) return "";
      return a.length > 12 ? a.slice(0, 6) + "…" + a.slice(-4) : a;
    }

    function fmtDuration(sec) {
      if (sec == null || Number.isNaN(sec)) return "—";
      const s = Math.max(0, Math.floor(sec));
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (d > 0) return `${d}天 ${h}小时`;
      if (h > 0) return `${h}小时 ${m}分`;
      return `${m} 分钟`;
    }

    function renderRuntime(data) {
      const r = data.runtime || {};
      const el = $("#runtimeBanner");
      const status = r.status || "starting";
      el.className = status;
      el.hidden = false;
      const modeText = r.continuous_mode
        ? "持续模式 · 定时 tick 正常"
        : "非持续 · 定时任务可能已停或断线";
      const since = r.seconds_since_last_tick != null
        ? `距上次 tick ${fmtDuration(r.seconds_since_last_tick)}`
        : "尚未 tick";
      el.innerHTML = `
        <span><strong>${r.status_label || "—"}</strong></span>
        <span>${modeText}</span>
        <span>在线时长 ${fmtDuration(r.cumulative_online_seconds)}</span>
        <span>会话 ${fmtDuration(r.session_uptime_seconds)}</span>
        <span>${since}</span>
        <span>间隔 ${r.scan_interval_label || "—"} · tick ${r.tick_count ?? 0} 次</span>
      `;
    }

    function renderKpis(data) {
      const s = data.summary || {};
      const r = data.runtime || {};
      const intervalHint = r.scan_interval_label || ((data.config?.scan_interval_seconds || 1800) / 60) + " 分钟";
      const items = [
        { label: "总权益", value: fmtUsd(s.equity_usd), hint: "现金 + 持仓市值" },
        { label: "总盈亏", value: fmtUsd(s.total_pnl_usd), hint: fmtPct(s.total_pnl_pct), cls: pnlClass(s.total_pnl_usd) },
        { label: "运行状态", value: r.status_label || "—", hint: r.continuous_mode ? "持续运行" : "非持续/断线", cls: r.status === "online" ? "pos" : "neg" },
        { label: "在线时长", value: fmtDuration(r.cumulative_online_seconds), hint: "有效 tick 累计" },
        { label: "现金", value: fmtUsd(s.cash_usd), hint: "本金 " + fmtUsd(s.initial_cash_usd || data.config?.initial_cash_usd || 1000, 0) },
        { label: "持仓", value: String(s.open_positions || 0), hint: fmtUsd(s.positions_value_usd) + " 市值" },
        { label: "轮次", value: String(data.round || 0), hint: `每 ${intervalHint} +1 · 扫描 ${data.scan_count || 0} 次` },
        { label: "策略", value: data.config?.strategy_version || "—", hint: "Whale · sold≤50%" },
      ];
      $("#kpis").innerHTML = items.map((it) => `
        <div class="card">
          <div class="label">${it.label}</div>
          <div class="value ${it.cls || ""}">${it.value}</div>
          <div class="hint">${it.hint || ""}</div>
        </div>
      `).join("");
    }

    function renderChart(curve, initial) {
      const svg = $("#chart");
      if (!curve?.length) {
        svg.innerHTML = '<text x="300" y="100" fill="#8b9bb3" text-anchor="middle" font-size="14">暂无历史报告</text>';
        return;
      }
      const w = 600, h = 200, pad = 24;
      const values = curve.map((p) => p.equity_usd);
      const min = Math.min(initial, ...values) * 0.998;
      const max = Math.max(initial, ...values) * 1.002;
      const x = (i) => pad + (i / Math.max(1, curve.length - 1)) * (w - pad * 2);
      const y = (v) => h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
      const line = curve.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.equity_usd).toFixed(1)}`).join(" ");
      const baseY = y(initial);
      svg.innerHTML = `
        <line x1="${pad}" y1="${baseY}" x2="${w - pad}" y2="${baseY}" stroke="#243041" stroke-dasharray="4 4"/>
        <text x="${pad}" y="${baseY - 6}" fill="#8b9bb3" font-size="10">${fmtUsd(initial, 0)} 本金</text>
        <path d="${line}" fill="none" stroke="#5b9dff" stroke-width="2.5"/>
        ${curve.map((p, i) => `<circle cx="${x(i)}" cy="${y(p.equity_usd)}" r="4" fill="#3dd68c"/>`).join("")}
      `;
    }

    function table(headers, rows) {
      if (!rows.length) return '<div class="empty">暂无数据</div>';
      return `<table><thead><tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table>`;
    }

    function getLedger(data) {
      if (data.position_ledger?.length) return data.position_ledger;
      const rows = [];
      for (const p of data.open_positions || []) {
        rows.push({
          trade_id: p.trade_id, symbol: p.symbol, status: "持仓中",
          buy_price: p.entry_price, current_price: p.last_price, cost_usd: p.cost_usd,
          pnl_usd: p.unrealized_pnl_usd, pnl_pct: p.unrealized_pnl_pct, exit_reason: null,
        });
      }
      for (const p of data.closed_positions || []) {
        rows.push({
          trade_id: p.trade_id, symbol: p.symbol, status: "已平仓",
          buy_price: p.entry_price, sell_price: p.last_price, cost_usd: p.cost_usd,
          pnl_usd: p.realized_pnl_usd, pnl_pct: p.realized_pnl_pct, exit_reason: p.exit_reason,
        });
      }
      return rows;
    }

    function renderLedger(data) {
      const rows = getLedger(data).map((p) => {
        const isOpen = p.status === "持仓中";
        const sellOrMark = isOpen ? fmtPrice(p.current_price) : fmtPrice(p.sell_price);
        const sellLabel = isOpen ? "现价" : "卖出价";
        return `
        <tr>
          <td>${p.trade_id || "—"}</td>
          <td><strong>${p.symbol || "—"}</strong></td>
          <td><span class="pill ${isOpen ? "open" : "sell"}">${p.status}</span></td>
          <td class="num">${fmtPrice(p.buy_price)}</td>
          <td class="num" title="${sellLabel}">${sellOrMark}</td>
          <td class="num">${fmtUsd(p.cost_usd)}</td>
          <td class="num ${pnlClass(p.pnl_usd)}">${fmtUsd(p.pnl_usd)}</td>
          <td class="num ${pnlClass(p.pnl_pct)}">${fmtPct(p.pnl_pct)}</td>
          <td>${isOpen ? "持仓中" : (p.exit_reason || "—")}</td>
        </tr>`;
      });
      $("#ledgerWrap").innerHTML = table(
        ["ID", "代币", "状态", "买入价", "卖出价/现价", "成本", "盈亏额", "盈亏率", "备注"],
        rows
      );
    }

    function renderRounds(data) {
      const rows = (data.round_activity || []).slice().reverse().map((r) => `
        <tr>
          <td class="num">#${r.round}</td>
          <td class="num">${r.signals}</td>
          <td class="num">${r.candidates}</td>
          <td class="num">${r.opened}</td>
          <td class="num">${r.positions}</td>
        </tr>
      `);
      $("#roundsWrap").innerHTML = table(["轮次", "信号", "候选", "开仓", "持仓数"], rows);
    }

    function renderTrades(data) {
      const rows = (data.recent_trades || []).slice().reverse().map((t) => `
        <tr>
          <td><span class="pill ${t.type === "BUY" ? "buy" : "sell"}">${t.type === "BUY" ? "买入" : "卖出"}</span></td>
          <td><strong>${t.symbol || "—"}</strong></td>
          <td class="num">${fmtPrice(t.buy_price ?? t.entry_price)}</td>
          <td class="num">${t.type === "SELL" ? fmtPrice(t.sell_price ?? t.last_price) : "—"}</td>
          <td class="num">${fmtUsd(t.cost_usd)}</td>
          <td class="num ${pnlClass(t.pnl_usd)}">${t.type === "SELL" ? fmtUsd(t.pnl_usd) : "—"}</td>
          <td class="num ${pnlClass(t.pnl_pct)}">${t.type === "SELL" ? fmtPct(t.pnl_pct) : "—"}</td>
          <td>${t.exit_reason || "—"}</td>
          <td style="color:var(--muted);font-size:0.75rem">${(t.ts || "").replace("T", " ").slice(0, 19)}</td>
        </tr>
      `);
      $("#tradesWrap").innerHTML = table(
        ["类型", "代币", "买入价", "卖出价", "成本", "盈亏额", "盈亏率", "原因", "时间"],
        rows
      );
    }

    function renderConfig(data) {
      const c = data.config || {};
      const rows = Object.entries(c).map(([k, v]) => `
        <tr><td>${k}</td><td class="num">${v}</td></tr>
      `);
      $("#configWrap").innerHTML = table(["参数", "值"], rows);
    }

    function showLoadError(msg) {
      const el = $("#loadError");
      el.hidden = false;
      el.innerHTML = msg;
    }

    function setDataMode(mode, sourceLabel) {
      const el = $("#dataMode");
      const src = $("#dataSource");
      if (sourceLabel) src.textContent = sourceLabel;
      if (mode === "repo") {
        el.textContent = "仓库同步（推荐）";
        el.className = "status-online";
      } else if (mode === "live") {
        el.textContent = "本机服务";
        el.className = "status-online";
      } else {
        el.textContent = "离线快照";
        el.className = "status-offline";
      }
    }

    function renderAll(data, mode, sourceLabel) {
      $("#loadError").hidden = true;
      const chain = (data.chain || "solana").toUpperCase();
      const r = data.runtime || {};
      const nextMin = Math.ceil((data.next_round_in_seconds || 0) / 60);
      const nextHint = nextMin > 0 ? ` · 下轮约 ${nextMin} 分钟` : "";
      const runHint = r.status_label ? ` · ${r.status_label}` : "";
      $("#meta").textContent = `${chain} · ${data.config?.strategy_version || "—"} · 第 ${data.round} 轮${nextHint}${runHint} · 更新 ${(data.generated_at || "").replace("T", " UTC ").slice(0, 22)}`;
      renderRuntime(data);
      renderKpis(data);
      renderChart(data.equity_curve || [], data.config?.initial_cash_usd || 1000);
      renderLedger(data);
      renderRounds(data);
      renderTrades(data);
      renderConfig(data);
      setDataMode(mode, sourceLabel);
    }

    function snapshotSources() {
      const bust = "?t=" + Date.now();
      const onPages = location.hostname.endsWith("github.io");
      const list = [];
      if (onPages) {
        list.push({ url: "snapshot.json" + bust, mode: "repo", label: "GitHub Pages（同页）" });
      }
      list.push({
        url: GITHUB_RAW_SNAPSHOT + bust,
        mode: "repo",
        label: "GitHub 仓库 raw",
      });
      if (!onPages) {
        list.push({ url: "snapshot.json" + bust, mode: "live", label: "本机 snapshot.json" });
      }
      return list;
    }

    async function fetchSnapshotEntry(entry) {
      const res = await fetch(entry.url, { cache: "no-store" });
      if (!res.ok) throw new Error(entry.label + " HTTP " + res.status);
      return { data: await res.json(), mode: entry.mode, label: entry.label };
    }

    async function loadSnapshot() {
      const errors = [];
      for (const entry of snapshotSources()) {
        try {
          const { data, mode, label } = await fetchSnapshotEntry(entry);
          renderAll(data, mode, label);
          return;
        } catch (err) {
          errors.push(err.message || String(err));
        }
      }
      if (window.__SNAPSHOT__) {
        renderAll(window.__SNAPSHOT__, "offline", "同目录 data.js");
        return;
      }
      showLoadError(
        "无法加载面板数据。推荐打开稳定地址：<br>" +
        `<a href="${GITHUB_PAGES_URL}" target="_blank" rel="noopener">${GITHUB_PAGES_URL}</a><br><br>` +
        "本机修复：<code>python3 scripts/meme_sim_trader.py dashboard</code><br>" +
        "<code>./scripts/publish_dashboard.sh</code>（推送到仓库后 Pages 自动更新）<br>" +
        "<small>" + errors.join(" · ") + "</small>"
      );
    }

    $("#refreshBtn").addEventListener("click", loadSnapshot);
    let timer = null;
    function setupAuto() {
      if (timer) clearInterval(timer);
      if ($("#autoRefresh").checked) timer = setInterval(loadSnapshot, 30000);
    }
    $("#autoRefresh").addEventListener("change", setupAuto);
    loadSnapshot();
    setupAuto();
  </script>
</body>
</html>
